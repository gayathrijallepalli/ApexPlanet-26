<!-- index.html -->

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login & Registration</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- Google Font -->

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- CSS -->

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">

        <div class="row justify-content-center align-items-center min-vh-100">

            <div class="col-md-8 col-lg-5">

                <div class="form-box">

                    <!-- TOGGLE BUTTONS -->

                    <div class="button-box text-center mb-4">

                        <button class="toggle-btn active-btn"
                                id="loginBtn">

                            Login

                        </button>

                        <button class="toggle-btn"
                                id="registerBtn">

                            Register

                        </button>

                    </div>




                    <!-- LOGIN FORM -->

                    <form id="loginForm"
                          action="login.php"
                          method="POST">

                        <h2 class="text-center mb-4">

                            Welcome Back 👋

                        </h2>

                        <!-- EMAIL -->

                        <input type="email"
                               class="form-control mb-3"
                               placeholder="Enter Email"
                               name="email"
                               required>

                        <!-- PASSWORD -->

                        <div class="password-box">

                            <input type="password"
                                   class="form-control"
                                   id="loginPassword"
                                   placeholder="Enter Password"
                                   name="password"
                                   required>

                            <span class="toggle-password"
                                  onclick="togglePassword('loginPassword')">

                                  👁

                            </span>

                        </div>

                        <!-- LOGIN BUTTON -->

                        <button type="submit"
                                class="btn custom-btn w-100 mt-4">

                            Login

                        </button>

                    </form>




                    <!-- REGISTER FORM -->

                    <form id="registerForm"
                          class="d-none"
                          action="register.php"
                          method="POST">

                        <h2 class="text-center mb-4">

                            Create Account 🚀

                        </h2>

                        <!-- NAME -->

                        <input type="text"
                               class="form-control mb-3"
                               placeholder="Enter Name"
                               name="name"
                               required>

                        <!-- EMAIL -->

                        <input type="email"
                               class="form-control mb-3"
                               placeholder="Enter Email"
                               name="email"
                               required>

                        <!-- PASSWORD -->

                        <div class="password-box mb-3">

                            <input type="password"
                                   class="form-control"
                                   id="registerPassword"
                                   placeholder="Enter Password"
                                   name="password"
                                   required>

                            <span class="toggle-password"
                                  onclick="togglePassword('registerPassword')">

                                  👁

                            </span>

                        </div>

                        <!-- CONFIRM PASSWORD -->

                        <div class="password-box">

                            <input type="password"
                                   class="form-control"
                                   id="confirmPassword"
                                   placeholder="Confirm Password"
                                   required>

                            <span class="toggle-password"
                                  onclick="togglePassword('confirmPassword')">

                                  👁

                            </span>

                        </div>

                        <p id="message" class="mt-2"></p>

                        <!-- REGISTER BUTTON -->

                        <button type="submit"
                                class="btn custom-btn w-100 mt-3">

                            Register

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

    <!-- JS -->

    <script src="script.js"></script>

</body>

</html>
